<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Type scale · Inter</div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:60px;font-weight:300;line-height:1">Aa</span><span style="font-size:48px;font-weight:300;line-height:1;color:var(--token-color-text-subdued)">Aa</span><span class="swatch-label">display-large 60 · display-small 48 · weight 300</span></div>
    <div style="display:flex;align-items:baseline;gap:14px;margin-top:6px"><span style="font-size:40px;font-weight:500;line-height:1">Heading XL</span><span class="swatch-label">heading-xl 40 · medium 500</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:32px;font-weight:500;line-height:1.1">Heading large</span><span class="swatch-label">h1 · 32 · medium</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:24px;font-weight:500;line-height:1.1">Heading medium</span><span class="swatch-label">h2 · 24 · medium</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="font-size:20px;font-weight:500;line-height:1.1">Heading small</span><span class="swatch-label">h3 · 20 · medium</span></div>
  </div>
</div>
</body>
</html>
