<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .cats { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px 8px; }
  .cat { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .cat-sw { width: 100%; height: 30px; border-radius: 6px; }
  .cat-name { font-size: 9px; color: var(--token-color-text-subdued); text-align: center; line-height: 1.2; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Spend category palette · 28 fixed colors</div>
  <div class="cats">
    <div class="cat"><div class="cat-sw" style="background:#577590"></div><div class="cat-name">Housing</div></div>
    <div class="cat"><div class="cat-sw" style="background:#82aa46"></div><div class="cat-name">Groceries</div></div>
    <div class="cat"><div class="cat-sw" style="background:#ff8442"></div><div class="cat-name">Dining</div></div>
    <div class="cat"><div class="cat-sw" style="background:#e5ad04"></div><div class="cat-name">Transport</div></div>
    <div class="cat"><div class="cat-sw" style="background:#de2682"></div><div class="cat-name">Entertain</div></div>
    <div class="cat"><div class="cat-sw" style="background:#2ba1d4"></div><div class="cat-name">Utilities</div></div>
    <div class="cat"><div class="cat-sw" style="background:#a30015"></div><div class="cat-name">Health</div></div>
    <div class="cat"><div class="cat-sw" style="background:#cebe79"></div><div class="cat-name">Clothing</div></div>
    <div class="cat"><div class="cat-sw" style="background:#49c165"></div><div class="cat-name">Airfare</div></div>
    <div class="cat"><div class="cat-sw" style="background:#a4433d"></div><div class="cat-name">Lodging</div></div>
    <div class="cat"><div class="cat-sw" style="background:#b77b43"></div><div class="cat-name">Fuel</div></div>
    <div class="cat"><div class="cat-sw" style="background:#4884bc"></div><div class="cat-name">Games</div></div>
    <div class="cat"><div class="cat-sw" style="background:#b191ff"></div><div class="cat-name">Gifts</div></div>
    <div class="cat"><div class="cat-sw" style="background:#50667f"></div><div class="cat-name">Drinks</div></div>
    <div class="cat"><div class="cat-sw" style="background:#48bcb0"></div><div class="cat-name">Education</div></div>
    <div class="cat"><div class="cat-sw" style="background:#972acf"></div><div class="cat-name">Grooming</div></div>
    <div class="cat"><div class="cat-sw" style="background:#888d53"></div><div class="cat-name">Pets</div></div>
    <div class="cat"><div class="cat-sw" style="background:#fc440f"></div><div class="cat-name">Vehicle</div></div>
    <div class="cat"><div class="cat-sw" style="background:#f15f62"></div><div class="cat-name">Taxes</div></div>
    <div class="cat"><div class="cat-sw" style="background:#df81c1"></div><div class="cat-name">Hobby</div></div>
    <div class="cat"><div class="cat-sw" style="background:#776871"></div><div class="cat-name">Other</div></div>
  </div>
</div>
</body>
</html>
