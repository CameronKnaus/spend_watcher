<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: flex; width: 100%; border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--token-background-secondary-elevation-low); }
  .scale > div { flex: 1; height: 64px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 9px; font-family: var(--font-family-mono); }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Neutrals · cool-tinted greyscale</div>
  <div class="scale">
    <div style="background:#333333;color:#fff">000</div>
    <div style="background:#465053;color:#fff">100</div>
    <div style="background:#64767d;color:#fff">200</div>
    <div style="background:#778e97;color:#fff">300</div>
    <div style="background:#a6b8bf;color:#fff">400</div>
    <div style="background:#c3d4da">500</div>
    <div style="background:#d4e2e8">600</div>
    <div style="background:#e2eef3">700</div>
    <div style="background:#f0f7f9">800</div>
    <div style="background:#f8fbfc">900</div>
    <div style="background:#ffffff">1000</div>
  </div>
  <div class="swatch-label">Greys carry a faint blue-green cast. Page = 800 <span class="mono">#f0f7f9</span> · tile = 900 <span class="mono">#f8fbfc</span> · text = 100 <span class="mono">#465053</span></div>
</div>
</body>
</html>
