<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Money treatment · thin & large, colored by gain/loss</div>
  <div class="card-row" style="gap:36px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;gap:2px">
      <span class="swatch-label">Total spent</span>
      <span style="font-size:32px;font-weight:300;font-variant-numeric:tabular-nums;color:var(--token-color-semantic-loss)">−$3,142.80</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:2px">
      <span class="swatch-label">Net worth · YTD</span>
      <span style="font-size:32px;font-weight:300;font-variant-numeric:tabular-nums;color:var(--token-color-semantic-gain)">+$7,702.00</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:2px">
      <span class="swatch-label">Empty</span>
      <span style="font-size:32px;font-weight:300;color:var(--token-color-text-placeholder)">--</span>
    </div>
  </div>
  <div class="swatch-label">Tabular-nums · weight 300 · gain green, loss red. Absent values render as the literal <span class="mono">--</span>.</div>
</div>
</body>
</html>
