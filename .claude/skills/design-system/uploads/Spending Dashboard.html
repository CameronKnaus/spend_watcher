<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spending Dashboard · SpendWatcher</title>
  <link rel="icon" href="assets/spendwatcher-logo.png"/>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }
    button { font-family: inherit; }
    .sw-tile { transition: box-shadow .2s; }
    /* table tweaks */
    table { font-feature-settings: 'tnum'; }
    /* Selection */
    ::selection { background: var(--theme-color-primary-800); color: var(--theme-color-primary-100); }
    /* responsive guards */
    @media (max-width: 1100px) {
      main > div[style*="grid-template-columns: 2fr 1fr"],
      main > div[style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
    }
    @media (max-width: 720px) {
      header { flex-direction: column; gap: 12px; align-items: flex-start !important; }
      main { padding: 16px !important; }
      .kpis { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="charts-timeseries.jsx"></script>
  <script type="text/babel" src="charts-category.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
